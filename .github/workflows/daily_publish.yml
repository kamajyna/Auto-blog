name: Daily Auto Blog Publisher

on:
  schedule:
    # 주 5회 (월~금) 오전 6시 KST (UTC 기준 일~목 21:00)
    - cron: '0 21 * * 0-4'
  workflow_dispatch: # 수동 실행을 위한 설정

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Run auto blogger script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/auto_blogger.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git commit -m "Auto-published post: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
