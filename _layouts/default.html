<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ko" }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <meta name="google-site-verification" content="googlec51fe6c03c100160" />
  <meta name="naver-site-verification" content="716daf1fd0674e0e042ac9bc407ee5fa3560d6ec" />
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <!-- Google Fonts: Inter & Pretendard -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  {%- if site.google_analytics -%}
  <!-- Global site tag (gtag.js) - Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}');
  </script>
  {%- endif -%}
</head>
<body>
  <header class="site-header">
    <div class="wrapper site-header-wrapper">
      <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
      <nav class="site-nav">
        <div class="trigger">
          <a class="page-link" href="{{ "/archive/" | relative_url }}">전체 글</a>
          <a class="page-link" href="{{ "/feed.xml" | relative_url }}" target="_blank">RSS</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer h-card">
    <div class="wrapper">
      <p class="text-muted">© {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
